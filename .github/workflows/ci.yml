name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          # .env is gitignored; CI uses .env.example for compose validation only
          cp docker/.env.example docker/.env
          docker compose -f docker/compose.yml --profile cloud config --quiet
          docker compose -f docker/compose.yml -f docker/compose.deploy.yml --profile cloud config --quiet

      - name: Validate deploy script syntax
        run: bash -n docker/scripts/deploy.sh && bash -n docker/scripts/compose.sh

  build-images:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true
          tags: health-assistant-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: false
          load: true
          tags: health-assistant-agent:ci
          build-args: |
            SKIP_DOWNLOAD=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: docker/frontend/Dockerfile
          push: false
          load: true
          tags: health-assistant-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
